<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Бомжара CEO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #1f1f2e, #111118);
        color: white;
        text-align: center;
        user-select: none;
      }

      .game {
        max-width: 520px;
        margin: 0 auto;
        padding: 18px;
      }

      h1 {
        margin: 10px 0 6px;
        font-size: 32px;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 20px;
        text-align: left;
      }

      .subtitle {
        opacity: 0.8;
        margin-bottom: 16px;
      }

      .money {
        font-size: 38px;
        font-weight: bold;
        margin: 18px 0 5px;
      }

      .income {
        opacity: 0.8;
        margin-bottom: 14px;
      }

      .rank {
        display: inline-block;
        padding: 8px 14px;
        margin: 8px 0;
        border-radius: 999px;
        background: rgba(255, 204, 77, 0.14);
        color: #ffcc4d;
        font-weight: bold;
        font-size: 15px;
      }

      .progressWrap {
        width: 100%;
        height: 12px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        overflow: hidden;
        margin: 4px auto 6px;
      }

      .progressBar {
        width: 0%;
        height: 100%;
        background: #ffcc4d;
        border-radius: 999px;
        transition: width 0.2s ease;
      }

      .progressText {
        font-size: 13px;
        opacity: 0.75;
        margin-bottom: 12px;
      }

      .character {
        width: 178px;
        height: 178px;
        border-radius: 50%;
        background: radial-gradient(circle, #ffce73, #d88a22);
        margin: 18px auto;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 80px;
        box-shadow: 0 10px 0 #8d5415;
        cursor: pointer;
        transition:
          transform 0.08s,
          box-shadow 0.08s;
      }

      .character:active {
        transform: translateY(8px) scale(0.97);
        box-shadow: 0 2px 0 #8d5415;
      }

      .event {
        min-height: 24px;
        margin: 10px 0 14px;
        color: #ffcc4d;
        font-weight: bold;
      }

      .panel {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 15px;
        margin-top: 14px;
      }

      .btn {
        width: 100%;
        border: none;
        border-radius: 14px;
        padding: 14px;
        margin: 8px 0;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        background: #ffcc4d;
        color: #1c1c1c;
      }

      .btn:disabled {
        background: #555;
        color: #aaa;
        cursor: not-allowed;
      }

      .btn.secondary {
        background: rgba(255, 255, 255, 0.14);
        color: white;
      }

      .shopGrid,
      .questsList {
        display: grid;
        gap: 10px;
      }

      .upgradeCard,
      .questCard {
        text-align: left;
        background: rgba(0, 0, 0, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 12px;
      }

      .cardTop {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: flex-start;
      }

      .cardTitle {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 4px;
      }

      .cardDesc,
      .questProgressText {
        font-size: 13px;
        opacity: 0.78;
        line-height: 1.35;
      }

      .levelBadge,
      .questBadge {
        flex: 0 0 auto;
        border-radius: 999px;
        padding: 5px 9px;
        background: rgba(255, 204, 77, 0.13);
        color: #ffcc4d;
        font-size: 12px;
        font-weight: bold;
      }

      .buyBtn,
      .claimBtn {
        margin-top: 10px;
        padding: 11px 12px;
        font-size: 14px;
      }

      .questProgressWrap {
        width: 100%;
        height: 8px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        overflow: hidden;
        margin-top: 9px;
      }

      .questProgressBar {
        height: 100%;
        background: #ffcc4d;
        border-radius: 999px;
        transition: width 0.2s ease;
      }

      .questDone {
        border-color: rgba(255, 204, 77, 0.45);
      }

      .small {
        font-size: 13px;
        opacity: 0.7;
        line-height: 1.4;
      }
    </style>
  </head>

  <body>
    <div class="game">
      <h1>Бомжара CEO</h1>
      <div class="subtitle">Кликай, богатея. Стань легендой района.</div>

      <div class="money" id="money">0 ₽</div>
      <div class="income" id="income">+0 ₽/сек · +1 ₽/клик</div>
      <div class="rank" id="rankText">Бомж района</div>

      <div class="progressWrap">
        <div class="progressBar" id="progressBar"></div>
      </div>

      <div class="progressText" id="progressText">
        До уровня “Сборщик мелочи”: 500 ₽
      </div>

      <div class="character" id="clickButton">🥴</div>
      <div class="event" id="eventText"></div>

      <div class="panel">
        <h2>Быстрые действия</h2>
        <button class="btn" id="boostButton">Мем-буст x2 на 30 сек</button>
        <button class="btn" id="dailyButton">Забрать ежедневный бонус</button>
        <button class="btn secondary" id="shareButton">Позвать друга</button>
      </div>

      <div class="panel">
        <h2>Апгрейды клика</h2>
        <div class="shopGrid" id="clickShop"></div>
      </div>

      <div class="panel">
        <h2>Бизнесы</h2>
        <div class="shopGrid" id="businessShop"></div>
      </div>

      <div class="panel">
        <h2>Задания района</h2>
        <div class="questsList" id="questsList"></div>
      </div>

      <div class="panel">
        <button class="btn secondary" id="resetButton">Сбросить прогресс</button>
        <p class="small">
          Район ждёт легенду. Дальше добавим коллекции, рейтинг и кланы.
        </p>
      </div>
    </div>

    <script>
      const tg = window.Telegram?.WebApp;

      if (tg) {
        tg.ready();
        tg.expand();
      }

      const SAVE_KEY = "bomzhara_ceo_save";

      const defaultState = {
        money: 0,
        totalEarned: 0,
        boostActive: false,
        boostEndTime: 0,
        lastSaveTime: Date.now(),
        dailyBonusLastClaim: 0,
        upgrades: {},
        claimedQuests: {},
        stats: {
          clickCount: 0,
          dailyClaimCount: 0,
          shareCount: 0,
          clickUpgradePurchases: 0,
          businessUpgradePurchases: 0,
        },
      };

      const ranks = [
        { title: "Бомж района", need: 0 },
        { title: "Сборщик мелочи", need: 500 },
        { title: "Шаурма-стажёр", need: 5_000 },
        { title: "Дворовый бизнесмен", need: 25_000 },
        { title: "Шаурма-магнат", need: 150_000 },
        { title: "Олигарх района", need: 750_000 },
        { title: "Легенда района", need: 5_000_000 },
      ];

      const clickUpgrades = [
        {
          id: "raggedCup",
          title: "Рваный стаканчик",
          description: "+1 ₽ за клик за каждый уровень",
          baseCost: 40,
          costMultiplier: 1.95,
          effectPerLevel: 1,
        },
        {
          id: "ceoSign",
          title: "Табличка “Помогите CEO”",
          description: "+5 ₽ за клик за каждый уровень",
          baseCost: 280,
          costMultiplier: 2.05,
          effectPerLevel: 5,
        },
        {
          id: "districtCharisma",
          title: "Харизма района",
          description: "+18 ₽ за клик за каждый уровень",
          baseCost: 1_800,
          costMultiplier: 2.15,
          effectPerLevel: 18,
        },
        {
          id: "successCourse",
          title: "Курсы успеха",
          description: "+75 ₽ за клик за каждый уровень",
          baseCost: 12_000,
          costMultiplier: 2.25,
          effectPerLevel: 75,
        },
        {
          id: "investorPitch",
          title: "Питч инвестору",
          description: "+320 ₽ за клик за каждый уровень",
          baseCost: 95_000,
          costMultiplier: 2.35,
          effectPerLevel: 320,
        },
      ];

      const businessUpgrades = [
        {
          id: "shawarmaPoint",
          title: "Шаурма-точка",
          description: "+3 ₽/сек за каждый уровень",
          baseCost: 180,
          costMultiplier: 1.95,
          effectPerLevel: 3,
        },
        {
          id: "metroKiosk",
          title: "Ларёк у метро",
          description: "+18 ₽/сек за каждый уровень",
          baseCost: 1_600,
          costMultiplier: 2.08,
          effectPerLevel: 18,
        },
        {
          id: "miniBusiness",
          title: "Мини-бизнес",
          description: "+95 ₽/сек за каждый уровень",
          baseCost: 14_000,
          costMultiplier: 2.16,
          effectPerLevel: 95,
        },
        {
          id: "shawarmaNetwork",
          title: "Сеть шаурмы",
          description: "+520 ₽/сек за каждый уровень",
          baseCost: 110_000,
          costMultiplier: 2.28,
          effectPerLevel: 520,
        },
        {
          id: "districtEmpire",
          title: "Районная империя",
          description: "+3 000 ₽/сек за каждый уровень",
          baseCost: 850_000,
          costMultiplier: 2.4,
          effectPerLevel: 3_000,
        },
      ];

      const quests = [
        {
          id: "click250",
          title: "Разогреть палец",
          description: "Сделай 250 кликов",
          target: 250,
          reward: 900,
          getProgress: () => state.stats.clickCount,
        },
        {
          id: "click1000",
          title: "Кликер района",
          description: "Сделай 1 000 кликов",
          target: 1_000,
          reward: 5_000,
          getProgress: () => state.stats.clickCount,
        },
        {
          id: "earn10000",
          title: "Первые серьёзные деньги",
          description: "Заработай всего 10 000 ₽",
          target: 10_000,
          reward: 7_500,
          getProgress: () => state.totalEarned,
        },
        {
          id: "clickUpgrades10",
          title: "Прокачать харизму",
          description: "Купи 10 апгрейдов клика суммарно",
          target: 10,
          reward: 8_000,
          getProgress: () => getTotalUpgradeLevel(clickUpgrades),
        },
        {
          id: "businessUpgrades8",
          title: "Бизнес пахнет шаурмой",
          description: "Купи 8 бизнес-апгрейдов суммарно",
          target: 8,
          reward: 12_000,
          getProgress: () => getTotalUpgradeLevel(businessUpgrades),
        },
        {
          id: "daily3",
          title: "Возвращайся в район",
          description: "Забери ежедневный бонус 3 раза",
          target: 3,
          reward: 35_000,
          getProgress: () => state.stats.dailyClaimCount,
        },
        {
          id: "share3",
          title: "Позови банду",
          description: "Позови друга 3 раза",
          target: 3,
          reward: 10_000,
          getProgress: () => state.stats.shareCount,
        },
        {
          id: "rankBusinessman",
          title: "Стать дворовым бизнесменом",
          description: "Достигни ранга “Дворовый бизнесмен”",
          target: 25_000,
          reward: 25_000,
          getProgress: () => state.totalEarned,
        },
      ];

      let state = loadGame();

      const moneyEl = document.getElementById("money");
      const incomeEl = document.getElementById("income");
      const rankText = document.getElementById("rankText");
      const progressBar = document.getElementById("progressBar");
      const progressText = document.getElementById("progressText");
      const clickButton = document.getElementById("clickButton");
      const boostButton = document.getElementById("boostButton");
      const dailyButton = document.getElementById("dailyButton");
      const shareButton = document.getElementById("shareButton");
      const resetButton = document.getElementById("resetButton");
      const eventText = document.getElementById("eventText");
      const subtitleEl = document.querySelector(".subtitle");
      const clickShop = document.getElementById("clickShop");
      const businessShop = document.getElementById("businessShop");
      const questsList = document.getElementById("questsList");

      const telegramUser = tg?.initDataUnsafe?.user;

      if (telegramUser?.first_name) {
        subtitleEl.textContent = `${telegramUser.first_name}, кликай и стань легендой района.`;
      }

      applyMigration();
      renderShop();
      renderQuests();
      applyOfflineProgress();
      updateUI();

      function loadGame() {
        const saved = localStorage.getItem(SAVE_KEY);

        if (!saved) {
          return structuredClone(defaultState);
        }

        try {
          return mergeState(structuredClone(defaultState), JSON.parse(saved));
        } catch (error) {
          console.warn("Save loading error", error);
          return structuredClone(defaultState);
        }
      }

      function mergeState(base, saved) {
        return {
          ...base,
          ...saved,
          upgrades: {
            ...base.upgrades,
            ...(saved.upgrades || {}),
          },
          claimedQuests: {
            ...base.claimedQuests,
            ...(saved.claimedQuests || {}),
          },
          stats: {
            ...base.stats,
            ...(saved.stats || {}),
          },
        };
      }

      function applyMigration() {
        if (!state.totalEarned || state.totalEarned < state.money) {
          state.totalEarned = state.money;
        }

        if (!state.upgrades.raggedCup && state.clickUpgradeLevel > 0) {
          state.upgrades.raggedCup = state.clickUpgradeLevel;
        }

        if (!state.upgrades.shawarmaPoint && state.autoUpgradeLevel > 0) {
          state.upgrades.shawarmaPoint = state.autoUpgradeLevel;
        }

        state.stats.clickUpgradePurchases = Math.max(
          state.stats.clickUpgradePurchases || 0,
          state.clickUpgradeLevel || 0,
        );

        state.stats.businessUpgradePurchases = Math.max(
          state.stats.businessUpgradePurchases || 0,
          state.autoUpgradeLevel || 0,
        );
      }

      function saveGame() {
        state.lastSaveTime = Date.now();
        state.perClick = getPerClick();
        state.perSecond = getPerSecond();
        localStorage.setItem(SAVE_KEY, JSON.stringify(state));
      }

      function formatMoney(value) {
        if (value >= 1_000_000_000)
          return (value / 1_000_000_000).toFixed(1) + " млрд ₽";
        if (value >= 1_000_000)
          return (value / 1_000_000).toFixed(1) + " млн ₽";
        if (value >= 1_000) return (value / 1_000).toFixed(1) + " тыс ₽";
        return Math.floor(value) + " ₽";
      }

      function getUpgradeLevel(upgradeId) {
        return state.upgrades[upgradeId] || 0;
      }

      function getUpgradeCost(upgrade) {
        const level = getUpgradeLevel(upgrade.id);
        return Math.floor(upgrade.baseCost * upgrade.costMultiplier ** level);
      }

      function getTotalUpgradeLevel(upgrades) {
        return upgrades.reduce((sum, upgrade) => sum + getUpgradeLevel(upgrade.id), 0);
      }

      function getPerClick() {
        return 1 + clickUpgrades.reduce(
          (sum, upgrade) => sum + getUpgradeLevel(upgrade.id) * upgrade.effectPerLevel,
          0,
        );
      }

      function getPerSecond() {
        return businessUpgrades.reduce(
          (sum, upgrade) => sum + getUpgradeLevel(upgrade.id) * upgrade.effectPerLevel,
          0,
        );
      }

      function addMoney(amount) {
        state.money += amount;
        state.totalEarned += amount;
      }

      function spendMoney(amount) {
        state.money -= amount;
      }

      function getCurrentRank() {
        let currentRank = ranks[0];

        for (const rank of ranks) {
          if (state.totalEarned >= rank.need) {
            currentRank = rank;
          }
        }

        return currentRank;
      }

      function getNextRank() {
        for (const rank of ranks) {
          if (state.totalEarned < rank.need) {
            return rank;
          }
        }

        return null;
      }

      function updateRankUI() {
        const currentRank = getCurrentRank();
        const nextRank = getNextRank();

        rankText.textContent = currentRank.title;

        if (!nextRank) {
          progressBar.style.width = "100%";
          progressText.textContent = "Максимальный уровень района достигнут";
          return;
        }

        const currentNeed = currentRank.need;
        const nextNeed = nextRank.need;
        const progress =
          ((state.totalEarned - currentNeed) / (nextNeed - currentNeed)) * 100;
        const safeProgress = Math.max(0, Math.min(100, progress));

        progressBar.style.width = `${safeProgress}%`;
        progressText.textContent = `До уровня “${nextRank.title}”: ${formatMoney(
          nextNeed - state.totalEarned,
        )}`;
      }

      function applyOfflineProgress() {
        const now = Date.now();
        const awaySeconds = Math.floor((now - state.lastSaveTime) / 1000);
        const perSecond = getPerSecond();

        if (awaySeconds < 10 || perSecond <= 0) {
          return;
        }

        const maxOfflineSeconds = 60 * 60 * 3;
        const countedSeconds = Math.min(awaySeconds, maxOfflineSeconds);
        const earned = countedSeconds * perSecond;

        addMoney(earned);

        setTimeout(() => {
          showFloatingText(`Пока тебя не было: +${formatMoney(earned)}`);
          updateUI();
        }, 500);
      }

      function getBoostMultiplier() {
        const now = Date.now();

        if (state.boostActive && now < state.boostEndTime) {
          return 2;
        }

        if (state.boostActive && now >= state.boostEndTime) {
          state.boostActive = false;
          eventText.textContent = "Буст закончился. Район снова суров.";
        }

        return 1;
      }

      function renderShop() {
        renderUpgradeGroup(clickShop, clickUpgrades, "click");
        renderUpgradeGroup(businessShop, businessUpgrades, "business");
      }

      function renderUpgradeGroup(container, upgrades, type) {
        container.innerHTML = "";

        for (const upgrade of upgrades) {
          const card = document.createElement("div");
          card.className = "upgradeCard";
          card.innerHTML = `
            <div class="cardTop">
              <div>
                <div class="cardTitle">${upgrade.title}</div>
                <div class="cardDesc">${upgrade.description}</div>
              </div>
              <div class="levelBadge" id="level-${upgrade.id}">ур. 0</div>
            </div>
            <button class="btn buyBtn" id="buy-${upgrade.id}">Купить</button>
          `;

          container.appendChild(card);

          document
            .getElementById(`buy-${upgrade.id}`)
            .addEventListener("click", () => buyUpgrade(upgrade, type));
        }
      }

      function buyUpgrade(upgrade, type) {
        const cost = getUpgradeCost(upgrade);

        if (state.money < cost) {
          return;
        }

        spendMoney(cost);
        state.upgrades[upgrade.id] = getUpgradeLevel(upgrade.id) + 1;

        if (type === "click") {
          state.stats.clickUpgradePurchases += 1;
          showFloatingText(`${upgrade.title}: клик стал сильнее.`);
        } else {
          state.stats.businessUpgradePurchases += 1;
          showFloatingText(`${upgrade.title}: пассивный доход вырос.`);
        }

        tg?.HapticFeedback?.notificationOccurred?.("success");
        updateUI();
      }

      function updateShopUI() {
        for (const upgrade of [...clickUpgrades, ...businessUpgrades]) {
          const level = getUpgradeLevel(upgrade.id);
          const cost = getUpgradeCost(upgrade);
          const levelEl = document.getElementById(`level-${upgrade.id}`);
          const buyBtn = document.getElementById(`buy-${upgrade.id}`);

          levelEl.textContent = `ур. ${level}`;
          buyBtn.textContent = `Купить — ${formatMoney(cost)}`;
          buyBtn.disabled = state.money < cost;
        }
      }

      function renderQuests() {
        questsList.innerHTML = "";

        for (const quest of quests) {
          const card = document.createElement("div");
          card.className = "questCard";
          card.id = `quest-${quest.id}`;
          card.innerHTML = `
            <div class="cardTop">
              <div>
                <div class="cardTitle">${quest.title}</div>
                <div class="cardDesc">${quest.description}</div>
              </div>
              <div class="questBadge">+${formatMoney(quest.reward)}</div>
            </div>
            <div class="questProgressText" id="quest-text-${quest.id}"></div>
            <div class="questProgressWrap">
              <div class="questProgressBar" id="quest-bar-${quest.id}"></div>
            </div>
            <button class="btn claimBtn" id="claim-${quest.id}">Забрать</button>
          `;

          questsList.appendChild(card);

          document
            .getElementById(`claim-${quest.id}`)
            .addEventListener("click", () => claimQuest(quest));
        }
      }

      function updateQuestsUI() {
        for (const quest of quests) {
          const progress = Math.min(quest.getProgress(), quest.target);
          const isComplete = progress >= quest.target;
          const isClaimed = Boolean(state.claimedQuests[quest.id]);
          const percent = Math.min(100, (progress / quest.target) * 100);

          const card = document.getElementById(`quest-${quest.id}`);
          const text = document.getElementById(`quest-text-${quest.id}`);
          const bar = document.getElementById(`quest-bar-${quest.id}`);
          const button = document.getElementById(`claim-${quest.id}`);

          card.classList.toggle("questDone", isComplete && !isClaimed);
          text.textContent = `${formatMoney(progress).replace(" ₽", "")} / ${formatMoney(
            quest.target,
          ).replace(" ₽", "")}`;
          bar.style.width = `${percent}%`;

          if (isClaimed) {
            button.textContent = "Получено";
            button.disabled = true;
          } else if (isComplete) {
            button.textContent = `Забрать +${formatMoney(quest.reward)}`;
            button.disabled = false;
          } else {
            button.textContent = "Не выполнено";
            button.disabled = true;
          }
        }
      }

      function claimQuest(quest) {
        const progress = quest.getProgress();

        if (progress < quest.target || state.claimedQuests[quest.id]) {
          return;
        }

        state.claimedQuests[quest.id] = true;
        addMoney(quest.reward);
        tg?.HapticFeedback?.notificationOccurred?.("success");
        showFloatingText(`Задание выполнено: +${formatMoney(quest.reward)}`);
        updateUI();
      }

      function updateUI() {
        const boost = getBoostMultiplier();
        const perClick = getPerClick();
        const perSecond = getPerSecond();

        moneyEl.textContent = formatMoney(state.money);
        incomeEl.textContent = `+${formatMoney(perSecond * boost)}/сек · +${formatMoney(
          perClick * boost,
        )}/клик`;

        boostButton.textContent = state.boostActive
          ? "Мем-буст уже активен"
          : "Мем-буст x2 на 30 сек — 1 500 ₽";
        boostButton.disabled = state.money < 1_500 || state.boostActive;

        const now = Date.now();
        const oneDay = 24 * 60 * 60 * 1000;
        const dailyReady = now - state.dailyBonusLastClaim >= oneDay;

        dailyButton.disabled = !dailyReady;
        dailyButton.textContent = dailyReady
          ? "Забрать ежедневный бонус"
          : "Ежедневный бонус уже забран";

        updateRankUI();
        updateShopUI();
        updateQuestsUI();
        saveGame();
      }

      function showFloatingText(text) {
        eventText.textContent = text;
        setTimeout(() => {
          if (eventText.textContent === text) {
            eventText.textContent = "";
          }
        }, 1800);
      }

      clickButton.addEventListener("click", () => {
        tg?.HapticFeedback?.impactOccurred?.("light");

        const gain = getPerClick() * getBoostMultiplier();
        addMoney(gain);
        state.stats.clickCount += 1;

        showFloatingText(`+${formatMoney(gain)}. Улица уважает тебя.`);
        updateUI();
      });

      boostButton.addEventListener("click", () => {
        if (state.money < 1_500 || state.boostActive) return;

        spendMoney(1_500);
        state.boostActive = true;
        state.boostEndTime = Date.now() + 30_000;

        showFloatingText("Мем-буст активирован: доход x2 на 30 секунд!");
        updateUI();
      });

      dailyButton.addEventListener("click", () => {
        const now = Date.now();
        const oneDay = 24 * 60 * 60 * 1000;

        if (now - state.dailyBonusLastClaim < oneDay) {
          return;
        }

        const bonus = 1_500 + getTotalUpgradeLevel(clickUpgrades) * 150 + getTotalUpgradeLevel(businessUpgrades) * 250;

        addMoney(bonus);
        state.dailyBonusLastClaim = now;
        state.stats.dailyClaimCount += 1;

        tg?.HapticFeedback?.notificationOccurred?.("success");
        showFloatingText(`Ежедневный бонус: +${formatMoney(bonus)}`);
        updateUI();
      });

      shareButton.addEventListener("click", () => {
        state.stats.shareCount += 1;
        saveGame();
        updateQuestsUI();

        const text = encodeURIComponent(
          `Я уже строю империю в “Бомжара CEO” 🥴\nСможешь обогнать меня?`,
        );
        const url = encodeURIComponent("https://t.me/bomzhara_ceo_bot");
        const shareUrl = `https://t.me/share/url?url=${url}&text=${text}`;

        if (tg?.openTelegramLink) {
          tg.openTelegramLink(shareUrl);
        } else {
          window.open(shareUrl, "_blank");
        }
      });

      resetButton.addEventListener("click", () => {
        const confirmed = confirm("Точно сбросить прогресс?");
        if (!confirmed) return;

        state = structuredClone(defaultState);
        saveGame();
        renderQuests();
        updateUI();
      });

      setInterval(() => {
        const boost = getBoostMultiplier();
        const passiveGain = getPerSecond() * boost;

        if (passiveGain > 0) {
          addMoney(passiveGain);
          updateUI();
        }
      }, 1000);

      setInterval(() => {
        const events = [
          "Прохожий кинул сотку за харизму.",
          "Блогер снял тебя в TikTok. Репутация растёт.",
          "Бабушка сказала: “молодец”. Мотивация +100.",
          "Районный инвестор заинтересовался твоим бизнесом.",
        ];

        if (Math.random() < 0.28) {
          const bonus = 50 + Math.floor(Math.random() * 150);
          addMoney(bonus);
          showFloatingText(
            `${events[Math.floor(Math.random() * events.length)]} +${bonus} ₽`,
          );
          updateUI();
        }
      }, 20_000);
    </script>
  </body>
</html>
