<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Бомжара CEO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html, body {
        overscroll-behavior: none;
      }

      button,
      .character,
      .tabBtn,
      .btn {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        touch-action: manipulation;
        outline: none;
      }

      button:focus,
      .btn:focus,
      .tabBtn:focus,
      .character:focus {
        outline: none;
      }

      button:focus-visible,
      .btn:focus-visible,
      .tabBtn:focus-visible {
        outline: 2px solid rgba(255, 204, 77, 0.5);
        outline-offset: 2px;
      }
      :root {
        --bg1: #1f1f2e;
        --bg2: #111118;
        --card: rgba(255, 255, 255, 0.08);
        --card2: rgba(0, 0, 0, 0.18);
        --line: rgba(255, 255, 255, 0.08);
        --muted: rgba(255, 255, 255, 0.72);
        --accent: #ffcc4d;
        --accentText: #1c1c1c;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        font-weight: 400;
        line-height: 1.35;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        background: linear-gradient(180deg, var(--bg1), var(--bg2));
        color: white;
        text-align: center;
        user-select: none;
      }
      .game {
        max-width: 520px;
        min-height: 100vh;
        margin: 0 auto;
        padding: 12px 12px 86px;
      }
      .topBar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }
      h1 { margin: 0; font-size: 23px; letter-spacing: -0.25px; font-weight: 700; }
      .subtitle { color: var(--muted); font-size: 13px; text-align: right; line-height: 1.25; font-weight: 500; }
      .heroPanel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 13px;
        box-shadow: 0 14px 40px rgba(0,0,0,0.22);
      }
      .money { font-size: 34px; font-weight: 700; letter-spacing: -0.6px; margin: 2px 0 4px; }
      .income { color: var(--muted); font-size: 13px; margin-bottom: 8px; font-weight: 500; }
      .rankRow {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin: 8px 0;
      }
      .rank {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(255, 204, 77, 0.14);
        color: var(--accent);
        font-weight: 700;
        font-size: 14px;
      }
      .progressWrap, .questProgressWrap {
        width: 100%;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        overflow: hidden;
      }
      .progressWrap { height: 10px; margin: 7px auto 5px; }
      .progressBar, .questProgressBar {
        height: 100%;
        width: 0%;
        background: var(--accent);
        border-radius: 999px;
        transition: width 0.2s ease;
      }
      .progressText { font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
      .character {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: radial-gradient(circle, #ffce73, #d88a22);
        margin: 14px auto 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 66px;
        box-shadow: 0 10px 0 #8d5415, 0 18px 40px rgba(255,204,77,0.12);
        cursor: pointer;
        transition: transform 0.08s, box-shadow 0.08s, filter 0.08s;
        overflow: hidden;
        border: none;
      }
      .characterEmoji {
        display: block;
        line-height: 1;
        transform: translateZ(0);
        pointer-events: none;
        background: transparent;
      }
      .character:active {
        transform: translateY(8px) scale(0.97);
        box-shadow: 0 2px 0 #8d5415;
        filter: brightness(0.98);
      }
      .event { min-height: 21px; margin: 7px 0 0; color: var(--accent); font-weight: 700; font-size: 13px; }
      .nextGoal {
        margin-top: 10px;
        padding: 10px;
        border-radius: 16px;
        background: rgba(0, 0, 0, 0.18);
        border: 1px solid var(--line);
        text-align: left;
      }
      .goalLabel { color: var(--muted); font-size: 12px; margin-bottom: 4px; }
      .goalText { font-weight: 650; font-size: 14px; line-height: 1.3; }
      .panel {
        display: none;
        margin-top: 12px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 12px;
      }
      .panel.active { display: block; }
      .panelHeader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }
      h2 { margin: 0; font-size: 17px; text-align: left; font-weight: 700; }
      .summaryPill, .levelBadge, .questBadge {
        flex: 0 0 auto;
        border-radius: 999px;
        padding: 5px 9px;
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255,255,255,0.82);
        font-size: 12px;
        font-weight: 700;
      }
      .quickGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .shopGrid, .questsList, .activeQuestsList { display: grid; gap: 8px; }
      .activeQuestsList { margin-top: 8px; gap: 6px; }
      .upgradeCard, .questCard, .miniQuestCard {
        text-align: left;
        background: var(--card2);
        border: 1px solid var(--line);
        border-radius: 16px;
      }
      .upgradeCard { padding: 9px; display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; }
      .questCard { padding: 9px; }
      .miniQuestCard { padding: 8px 9px; }
      .cardTitle { font-size: 14px; font-weight: 650; margin-bottom: 2px; letter-spacing: -0.05px; }
      .cardDesc, .questProgressText { font-size: 12px; color: var(--muted); line-height: 1.25; font-weight: 500; }
      .upgradeMeta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 6px; }
      .effectBadge { border-radius: 999px; padding: 4px 8px; background: rgba(255,204,77,0.12); color: var(--accent); font-size: 12px; font-weight: 650; }
      .btn {
        width: 100%;
        border: none;
        border-radius: 14px;
        padding: 12px 10px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        background: var(--accent);
        color: var(--accentText);
        transition: transform 0.08s, filter 0.08s, background 0.08s;
      }
      .btn:active:not(:disabled) { transform: scale(0.985); filter: brightness(0.96); }
      .btn:disabled { background: #555; color: #aaa; cursor: not-allowed; }
      .btn.secondary { background: rgba(255, 255, 255, 0.14); color: white; }
      .buyBtn { width: 106px; padding: 9px 8px; font-size: 13px; margin: 0; }
      .claimBtn { margin-top: 7px; padding: 9px 8px; font-size: 13px; }
      .questTop { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
      .questProgressWrap { height: 7px; margin-top: 8px; }
      .questDone { border-color: rgba(255, 204, 77, 0.55); }
      .emptyText, .small { font-size: 12px; color: var(--muted); line-height: 1.35; }
      .bottomTabs {
        position: fixed;
        left: 50%;
        bottom: 0;
        transform: translateX(-50%);
        width: min(520px, 100%);
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        padding: 8px 10px 12px;
        background: linear-gradient(180deg, rgba(17,17,24,0.08), rgba(17,17,24,0.97) 28%, #111118 100%);
        backdrop-filter: blur(12px);
        z-index: 20;
      }
      .tabBtn {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 9px 4px;
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.78);
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.08s, filter 0.08s, background 0.08s;
      }
      .tabBtn:active { transform: scale(0.98); filter: brightness(0.96); }
      .tabBtn.active { background: var(--accent); color: var(--accentText); border-color: var(--accent); }
      @media (max-width: 380px) {
        .money { font-size: 30px; }
        .character { width: 126px; height: 126px; font-size: 60px; }
        .buyBtn { width: 98px; font-size: 12px; }
        .tabBtn { font-size: 11px; }
      }
    </style>
  </head>

  <body>
    <div class="game">
      <div class="topBar">
        <h1>Бомжара CEO</h1>
        <div class="subtitle" id="subtitle">Стань легендой района</div>
      </div>

      <div class="heroPanel">
        <div class="money" id="money">0 ₽</div>
        <div class="income" id="income">+0 ₽/сек · +1 ₽/клик</div>
        <div class="rankRow">
          <div class="rank" id="rankText">🥴 Бомж района</div>
        </div>
        <div class="progressWrap"><div class="progressBar" id="progressBar"></div></div>
        <div class="progressText" id="progressText">До уровня “Сборщик мелочи”: 500 ₽</div>
        <div class="character" id="clickButton" role="button" aria-label="Кликнуть"><span class="characterEmoji" id="characterEmoji">🥴</span></div>
        <div class="event" id="eventText"></div>
        <div class="nextGoal">
          <div class="goalLabel">Следующая цель</div>
          <div class="goalText" id="nextGoalText">Купить первый апгрейд</div>
        </div>
      </div>

      <div class="panel active" id="tab-main">
        <div class="panelHeader">
          <h2>Главное</h2>
          <span class="summaryPill" id="mainSummary">Старт</span>
        </div>
        <div class="quickGrid">
          <button class="btn" id="boostButton">Мем-буст</button>
          <button class="btn" id="dailyButton">Бонус</button>
          <button class="btn secondary" id="shareButton">Позвать друга</button>
          <button class="btn secondary" id="resetButton">Сброс</button>
        </div>
        <div class="activeQuestsList" id="activeQuestsList"></div>
      </div>

      <div class="panel" id="tab-clicks">
        <div class="panelHeader">
          <h2>Клик</h2>
          <span class="summaryPill" id="clickSummary">0 ур.</span>
        </div>
        <div class="shopGrid" id="clickShop"></div>
      </div>

      <div class="panel" id="tab-business">
        <div class="panelHeader">
          <h2>Бизнес</h2>
          <span class="summaryPill" id="businessSummary">0 ур.</span>
        </div>
        <div class="shopGrid" id="businessShop"></div>
      </div>

      <div class="panel" id="tab-quests">
        <div class="panelHeader">
          <h2>Задания</h2>
          <span class="summaryPill" id="questsSummary">0 выполнено</span>
        </div>
        <div class="questsList" id="questsList"></div>
      </div>
    </div>

    <div class="bottomTabs" aria-label="Разделы игры">
      <button class="tabBtn active" data-tab="main">Главное</button>
      <button class="tabBtn" data-tab="clicks">Клик</button>
      <button class="tabBtn" data-tab="business">Бизнес</button>
      <button class="tabBtn" data-tab="quests">Задания</button>
    </div>

    <script>
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
      }

      const SAVE_KEY = "bomzhara_ceo_save";
      const BOT_URL = "https://t.me/bomzhara_ceo_bot";

      const defaultState = {
        money: 0,
        totalEarned: 0,
        boostActive: false,
        boostEndTime: 0,
        lastSaveTime: Date.now(),
        dailyBonusLastClaim: 0,
        upgrades: {},
        claimedQuests: {},
        stats: {
          clickCount: 0,
          dailyClaimCount: 0,
          shareCount: 0,
          clickUpgradePurchases: 0,
          businessUpgradePurchases: 0,
        },
      };

      const ranks = [
        { title: "Бомж района", icon: "🥴", need: 0 },
        { title: "Сборщик мелочи", icon: "🧢", need: 500 },
        { title: "Шаурма-стажёр", icon: "🌯", need: 5_000 },
        { title: "Дворовый бизнесмен", icon: "😎", need: 25_000 },
        { title: "Шаурма-магнат", icon: "🤵", need: 150_000 },
        { title: "Олигарх района", icon: "🤑", need: 750_000 },
        { title: "Легенда района", icon: "👑", need: 5_000_000 },
      ];

      const clickUpgrades = [
        { id: "raggedCup", title: "Рваный стаканчик", description: "Базовая прокачка клика", baseCost: 40, costMultiplier: 1.95, effectPerLevel: 1, effectLabel: "+1/клик" },
        { id: "ceoSign", title: "Табличка CEO", description: "Прохожие верят в стартап", baseCost: 280, costMultiplier: 2.05, effectPerLevel: 5, effectLabel: "+5/клик" },
        { id: "districtCharisma", title: "Харизма района", description: "Каждый клик становится весомее", baseCost: 1_800, costMultiplier: 2.15, effectPerLevel: 18, effectLabel: "+18/клик" },
        { id: "successCourse", title: "Курсы успеха", description: "Инфобизнес работает на тебя", baseCost: 12_000, costMultiplier: 2.25, effectPerLevel: 75, effectLabel: "+75/клик" },
        { id: "investorPitch", title: "Питч инвестору", description: "Каждый тап звучит дорого", baseCost: 95_000, costMultiplier: 2.35, effectPerLevel: 320, effectLabel: "+320/клик" },
      ];

      const businessUpgrades = [
        { id: "shawarmaPoint", title: "Шаурма-точка", description: "Первый пассивный доход", baseCost: 180, costMultiplier: 1.95, effectPerLevel: 3, effectLabel: "+3/сек" },
        { id: "metroKiosk", title: "Ларёк у метро", description: "Деньги капают быстрее", baseCost: 1_600, costMultiplier: 2.08, effectPerLevel: 18, effectLabel: "+18/сек" },
        { id: "miniBusiness", title: "Мини-бизнес", description: "Район начинает работать", baseCost: 14_000, costMultiplier: 2.16, effectPerLevel: 95, effectLabel: "+95/сек" },
        { id: "shawarmaNetwork", title: "Сеть шаурмы", description: "Почти империя", baseCost: 110_000, costMultiplier: 2.28, effectPerLevel: 520, effectLabel: "+520/сек" },
        { id: "districtEmpire", title: "Районная империя", description: "Дворовая экономика под контролем", baseCost: 850_000, costMultiplier: 2.4, effectPerLevel: 3_000, effectLabel: "+3000/сек" },
      ];

      let state = loadGame();

      const quests = [
        { id: "click250", title: "Разогреть палец", description: "Сделай 250 кликов", target: 250, reward: 900, getProgress: () => state.stats.clickCount },
        { id: "click1000", title: "Кликер района", description: "Сделай 1 000 кликов", target: 1_000, reward: 5_000, getProgress: () => state.stats.clickCount },
        { id: "earn10000", title: "Первые серьёзные деньги", description: "Заработай всего 10 000 ₽", target: 10_000, reward: 7_500, getProgress: () => state.totalEarned },
        { id: "clickUpgrades10", title: "Прокачать харизму", description: "Купи 10 апгрейдов клика", target: 10, reward: 8_000, getProgress: () => getTotalUpgradeLevel(clickUpgrades) },
        { id: "businessUpgrades8", title: "Бизнес пахнет шаурмой", description: "Купи 8 бизнес-апгрейдов", target: 8, reward: 12_000, getProgress: () => getTotalUpgradeLevel(businessUpgrades) },
        { id: "daily3", title: "Возвращайся в район", description: "Забери ежедневный бонус 3 раза", target: 3, reward: 35_000, getProgress: () => state.stats.dailyClaimCount },
        { id: "share3", title: "Позови банду", description: "Позови друга 3 раза", target: 3, reward: 10_000, getProgress: () => state.stats.shareCount },
        { id: "rankBusinessman", title: "Стать бизнесменом", description: "Достигни 25 000 ₽ общего заработка", target: 25_000, reward: 25_000, getProgress: () => state.totalEarned },
      ];

      const moneyEl = document.getElementById("money");
      const incomeEl = document.getElementById("income");
      const rankText = document.getElementById("rankText");
      const progressBar = document.getElementById("progressBar");
      const progressText = document.getElementById("progressText");
      const clickButton = document.getElementById("clickButton");
      const characterEmoji = document.getElementById("characterEmoji");
      const eventText = document.getElementById("eventText");
      const subtitleEl = document.getElementById("subtitle");
      const nextGoalText = document.getElementById("nextGoalText");
      const boostButton = document.getElementById("boostButton");
      const dailyButton = document.getElementById("dailyButton");
      const shareButton = document.getElementById("shareButton");
      const resetButton = document.getElementById("resetButton");
      const clickShop = document.getElementById("clickShop");
      const businessShop = document.getElementById("businessShop");
      const questsList = document.getElementById("questsList");
      const activeQuestsList = document.getElementById("activeQuestsList");
      const mainSummary = document.getElementById("mainSummary");
      const clickSummary = document.getElementById("clickSummary");
      const businessSummary = document.getElementById("businessSummary");
      const questsSummary = document.getElementById("questsSummary");
      const tabButtons = document.querySelectorAll(".tabBtn");
      const panels = document.querySelectorAll(".panel");

      const telegramUser = tg?.initDataUnsafe?.user;
      if (telegramUser?.first_name) {
        subtitleEl.textContent = `${telegramUser.first_name}, район ждёт тебя`;
      }

      function loadGame() {
        const saved = localStorage.getItem(SAVE_KEY);
        if (!saved) return clone(defaultState);

        try {
          return mergeState(defaultState, JSON.parse(saved));
        } catch (error) {
          console.warn("Save load error", error);
          return clone(defaultState);
        }
      }

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function mergeState(base, saved) {
        const merged = {
          ...clone(base),
          ...saved,
          upgrades: { ...base.upgrades, ...(saved.upgrades || {}) },
          claimedQuests: { ...base.claimedQuests, ...(saved.claimedQuests || {}) },
          stats: { ...base.stats, ...(saved.stats || {}) },
        };

        if (!merged.totalEarned || merged.totalEarned < merged.money) merged.totalEarned = merged.money;
        if (saved.clickUpgradeLevel && !merged.upgrades.raggedCup) merged.upgrades.raggedCup = saved.clickUpgradeLevel;
        if (saved.autoUpgradeLevel && !merged.upgrades.shawarmaPoint) merged.upgrades.shawarmaPoint = saved.autoUpgradeLevel;
        return merged;
      }

      function saveGame() {
        state.lastSaveTime = Date.now();
        localStorage.setItem(SAVE_KEY, JSON.stringify(state));
      }

      function formatMoney(value) {
        const number = Math.max(0, Math.floor(value));
        if (number >= 1_000_000_000) return `${(number / 1_000_000_000).toFixed(1)} млрд ₽`;
        if (number >= 1_000_000) return `${(number / 1_000_000).toFixed(1)} млн ₽`;
        if (number >= 1_000) return `${(number / 1_000).toFixed(1)} тыс ₽`;
        return `${number} ₽`;
      }

      function formatCount(value) {
        return String(Math.floor(value)).replace(/\B(?=(\d{3})+(?!\d))/g, " ");
      }

      function getUpgradeLevel(upgradeId) { return state.upgrades[upgradeId] || 0; }
      function getUpgradeCost(upgrade) { return Math.floor(upgrade.baseCost * upgrade.costMultiplier ** getUpgradeLevel(upgrade.id)); }
      function getTotalUpgradeLevel(upgrades) { return upgrades.reduce((sum, upgrade) => sum + getUpgradeLevel(upgrade.id), 0); }
      function getPerClick() { return 1 + clickUpgrades.reduce((sum, upgrade) => sum + getUpgradeLevel(upgrade.id) * upgrade.effectPerLevel, 0); }
      function getPerSecond() { return businessUpgrades.reduce((sum, upgrade) => sum + getUpgradeLevel(upgrade.id) * upgrade.effectPerLevel, 0); }
      function addMoney(amount) { state.money += amount; state.totalEarned += amount; }
      function spendMoney(amount) { state.money -= amount; }

      function getCurrentRank() {
        let currentRank = ranks[0];
        for (const rank of ranks) if (state.totalEarned >= rank.need) currentRank = rank;
        return currentRank;
      }

      function getNextRank() {
        return ranks.find((rank) => state.totalEarned < rank.need) || null;
      }

      function updateRankUI() {
        const currentRank = getCurrentRank();
        const nextRank = getNextRank();
        rankText.textContent = `${currentRank.icon} ${currentRank.title}`;
        characterEmoji.textContent = currentRank.icon;

        if (!nextRank) {
          progressBar.style.width = "100%";
          progressText.textContent = "Максимальный уровень района достигнут";
          return;
        }

        const currentNeed = currentRank.need;
        const progress = ((state.totalEarned - currentNeed) / (nextRank.need - currentNeed)) * 100;
        progressBar.style.width = `${Math.max(0, Math.min(100, progress))}%`;
        progressText.textContent = `До “${nextRank.title}”: ${formatMoney(nextRank.need - state.totalEarned)}`;
      }

      function applyOfflineProgress() {
        const awaySeconds = Math.floor((Date.now() - state.lastSaveTime) / 1000);
        const perSecond = getPerSecond();
        if (awaySeconds < 10 || perSecond <= 0) return;

        const earned = Math.min(awaySeconds, 60 * 60 * 3) * perSecond;
        addMoney(earned);
        setTimeout(() => {
          showFloatingText(`Пока тебя не было: +${formatMoney(earned)}`);
          updateUI();
        }, 500);
      }

      function getBoostMultiplier() {
        if (state.boostActive && Date.now() < state.boostEndTime) return 2;
        if (state.boostActive && Date.now() >= state.boostEndTime) {
          state.boostActive = false;
          eventText.textContent = "Буст закончился. Район снова суров.";
        }
        return 1;
      }

      function setupTabs() {
        tabButtons.forEach((button) => {
          button.addEventListener("click", () => {
            const tab = button.dataset.tab;
            tabButtons.forEach((item) => item.classList.toggle("active", item.dataset.tab === tab));
            panels.forEach((panel) => panel.classList.toggle("active", panel.id === `tab-${tab}`));
            window.scrollTo({ top: 0, behavior: "smooth" });
          });
        });
      }

      function renderShop() {
        renderUpgradeGroup(clickShop, clickUpgrades, "click");
        renderUpgradeGroup(businessShop, businessUpgrades, "business");
      }

      function renderUpgradeGroup(container, upgrades, type) {
        container.innerHTML = "";
        for (const upgrade of upgrades) {
          const card = document.createElement("div");
          card.className = "upgradeCard";
          card.innerHTML = `
            <div>
              <div class="cardTitle">${upgrade.title}</div>
              <div class="cardDesc">${upgrade.description}</div>
              <div class="upgradeMeta">
                <span class="levelBadge" id="level-${upgrade.id}">ур. 0</span>
                <span class="effectBadge">${upgrade.effectLabel}</span>
              </div>
            </div>
            <button class="btn buyBtn" id="buy-${upgrade.id}">Купить</button>
          `;
          container.appendChild(card);
          document.getElementById(`buy-${upgrade.id}`).addEventListener("click", () => buyUpgrade(upgrade, type));
        }
      }

      function buyUpgrade(upgrade, type) {
        const cost = getUpgradeCost(upgrade);
        if (state.money < cost) return;

        spendMoney(cost);
        state.upgrades[upgrade.id] = getUpgradeLevel(upgrade.id) + 1;
        if (type === "click") {
          state.stats.clickUpgradePurchases += 1;
          showFloatingText(`${upgrade.title}: клик стал сильнее.`);
        } else {
          state.stats.businessUpgradePurchases += 1;
          showFloatingText(`${upgrade.title}: пассивный доход вырос.`);
        }
        tg?.HapticFeedback?.notificationOccurred?.("success");
        updateUI();
      }

      function updateShopUI() {
        for (const upgrade of [...clickUpgrades, ...businessUpgrades]) {
          const level = getUpgradeLevel(upgrade.id);
          const cost = getUpgradeCost(upgrade);
          const button = document.getElementById(`buy-${upgrade.id}`);
          const badge = document.getElementById(`level-${upgrade.id}`);
          if (!button || !badge) continue;
          badge.textContent = `ур. ${level}`;
          button.textContent = formatMoney(cost);
          button.disabled = state.money < cost;
        }
      }

      function getQuestStatus(quest) {
        const progress = Math.min(quest.getProgress(), quest.target);
        return {
          progress,
          percent: Math.min(100, (progress / quest.target) * 100),
          complete: progress >= quest.target,
          claimed: Boolean(state.claimedQuests[quest.id]),
        };
      }

      function renderQuests() {
        questsList.innerHTML = "";
        for (const quest of quests) {
          const card = document.createElement("div");
          card.className = "questCard";
          card.id = `quest-${quest.id}`;
          card.innerHTML = `
            <div class="questTop">
              <div>
                <div class="cardTitle">${quest.title}</div>
                <div class="cardDesc">${quest.description}</div>
              </div>
              <div class="questBadge">+${formatMoney(quest.reward)}</div>
            </div>
            <div class="questProgressText" id="quest-text-${quest.id}"></div>
            <div class="questProgressWrap"><div class="questProgressBar" id="quest-bar-${quest.id}"></div></div>
            <button class="btn claimBtn" id="claim-${quest.id}">Забрать</button>
          `;
          questsList.appendChild(card);
          document.getElementById(`claim-${quest.id}`).addEventListener("click", () => claimQuest(quest));
        }
      }

      function updateQuestsUI() {
        for (const quest of quests) {
          const status = getQuestStatus(quest);
          const card = document.getElementById(`quest-${quest.id}`);
          const text = document.getElementById(`quest-text-${quest.id}`);
          const bar = document.getElementById(`quest-bar-${quest.id}`);
          const button = document.getElementById(`claim-${quest.id}`);
          if (!card || !text || !bar || !button) continue;

          card.classList.toggle("questDone", status.complete && !status.claimed);
          text.textContent = `${formatCount(status.progress)} / ${formatCount(quest.target)}`;
          bar.style.width = `${status.percent}%`;

          if (status.claimed) {
            button.textContent = "Получено";
            button.disabled = true;
          } else if (status.complete) {
            button.textContent = `Забрать +${formatMoney(quest.reward)}`;
            button.disabled = false;
          } else {
            button.textContent = "Не выполнено";
            button.disabled = true;
          }
        }
      }

      function updateActiveQuests() {
        const active = quests
          .filter((quest) => !state.claimedQuests[quest.id])
          .sort((a, b) => getQuestStatus(b).percent - getQuestStatus(a).percent)
          .slice(0, 2);

        activeQuestsList.innerHTML = "";
        if (active.length === 0) {
          activeQuestsList.innerHTML = '<div class="emptyText">Все задания забраны. Скоро добавим ежедневные цепочки.</div>';
          return;
        }

        for (const quest of active) {
          const status = getQuestStatus(quest);
          const card = document.createElement("div");
          card.className = "miniQuestCard";
          card.innerHTML = `
            <div class="questTop">
              <div>
                <div class="cardTitle">${quest.title}</div>
                <div class="cardDesc">${formatCount(status.progress)} / ${formatCount(quest.target)}</div>
              </div>
              <div class="questBadge">${Math.floor(status.percent)}%</div>
            </div>
            <div class="questProgressWrap"><div class="questProgressBar" style="width:${status.percent}%"></div></div>
          `;
          activeQuestsList.appendChild(card);
        }
      }

      function claimQuest(quest) {
        const status = getQuestStatus(quest);
        if (!status.complete || status.claimed) return;

        state.claimedQuests[quest.id] = true;
        addMoney(quest.reward);
        tg?.HapticFeedback?.notificationOccurred?.("success");
        showFloatingText(`Задание выполнено: +${formatMoney(quest.reward)}`);
        updateUI();
      }

      function getBestNextPurchase() {
        const candidates = [...clickUpgrades, ...businessUpgrades]
          .map((upgrade) => ({ ...upgrade, cost: getUpgradeCost(upgrade) }))
          .sort((a, b) => a.cost - b.cost);
        return candidates.find((item) => item.cost > state.money) || candidates[0];
      }

      function updateNextGoal() {
        const readyQuest = quests.find((quest) => {
          const status = getQuestStatus(quest);
          return status.complete && !status.claimed;
        });
        if (readyQuest) {
          nextGoalText.textContent = `Забрать награду: “${readyQuest.title}”`;
          return;
        }

        const nextPurchase = getBestNextPurchase();
        if (!nextPurchase) {
          nextGoalText.textContent = "Продолжай строить районную империю";
          return;
        }
        nextGoalText.textContent = `Купить “${nextPurchase.title}” — осталось ${formatMoney(nextPurchase.cost - state.money)}`;
      }

      function updateSummaries() {
        const clickLevels = getTotalUpgradeLevel(clickUpgrades);
        const businessLevels = getTotalUpgradeLevel(businessUpgrades);
        const completed = quests.filter((quest) => state.claimedQuests[quest.id]).length;
        const ready = quests.filter((quest) => {
          const status = getQuestStatus(quest);
          return status.complete && !status.claimed;
        }).length;

        mainSummary.textContent = `${formatMoney(getPerClick())}/клик`;
        clickSummary.textContent = `${clickLevels} ур.`;
        businessSummary.textContent = `${businessLevels} ур.`;
        questsSummary.textContent = ready > 0 ? `${ready} забрать` : `${completed}/${quests.length}`;
      }

      function updateUI() {
        const boost = getBoostMultiplier();
        const perClick = getPerClick();
        const perSecond = getPerSecond();
        moneyEl.textContent = formatMoney(state.money);
        incomeEl.textContent = `+${formatMoney(perSecond * boost)}/сек · +${formatMoney(perClick * boost)}/клик`;

        boostButton.textContent = state.boostActive ? "Буст активен" : "Буст x2 — 1 500 ₽";
        boostButton.disabled = state.money < 1_500 || state.boostActive;

        const oneDay = 24 * 60 * 60 * 1000;
        const dailyReady = Date.now() - state.dailyBonusLastClaim >= oneDay;
        dailyButton.textContent = dailyReady ? "Ежедневный бонус" : "Бонус забран";
        dailyButton.disabled = !dailyReady;

        updateRankUI();
        updateShopUI();
        updateQuestsUI();
        updateActiveQuests();
        updateNextGoal();
        updateSummaries();
        saveGame();
      }

      function showFloatingText(text) {
        eventText.textContent = text;
        setTimeout(() => {
          if (eventText.textContent === text) eventText.textContent = "";
        }, 1800);
      }

      clickButton.addEventListener("click", () => {
        tg?.HapticFeedback?.impactOccurred?.("light");
        const gain = getPerClick() * getBoostMultiplier();
        addMoney(gain);
        state.stats.clickCount += 1;
        showFloatingText(`+${formatMoney(gain)}. Улица уважает тебя.`);
        updateUI();
      });

      boostButton.addEventListener("click", () => {
        if (state.money < 1_500 || state.boostActive) return;
        spendMoney(1_500);
        state.boostActive = true;
        state.boostEndTime = Date.now() + 30_000;
        showFloatingText("Мем-буст активирован: доход x2 на 30 секунд!");
        updateUI();
      });

      dailyButton.addEventListener("click", () => {
        const oneDay = 24 * 60 * 60 * 1000;
        if (Date.now() - state.dailyBonusLastClaim < oneDay) return;

        const bonus = 1_500 + getTotalUpgradeLevel(clickUpgrades) * 150 + getTotalUpgradeLevel(businessUpgrades) * 250;
        addMoney(bonus);
        state.dailyBonusLastClaim = Date.now();
        state.stats.dailyClaimCount += 1;
        tg?.HapticFeedback?.notificationOccurred?.("success");
        showFloatingText(`Ежедневный бонус: +${formatMoney(bonus)}`);
        updateUI();
      });

      shareButton.addEventListener("click", () => {
        state.stats.shareCount += 1;
        saveGame();
        updateUI();

        const text = encodeURIComponent("Я уже строю империю в “Бомжара CEO” 🥴\nСможешь обогнать меня?");
        const url = encodeURIComponent(BOT_URL);
        const shareUrl = `https://t.me/share/url?url=${url}&text=${text}`;
        if (tg?.openTelegramLink) tg.openTelegramLink(shareUrl);
        else window.open(shareUrl, "_blank");
      });

      resetButton.addEventListener("click", () => {
        if (!confirm("Точно сбросить прогресс?")) return;
        state = clone(defaultState);
        saveGame();
        renderQuests();
        updateUI();
      });

      setInterval(() => {
        const passiveGain = getPerSecond() * getBoostMultiplier();
        if (passiveGain <= 0) return;
        addMoney(passiveGain);
        updateUI();
      }, 1000);

      setInterval(() => {
        const events = [
          "Прохожий кинул сотку за харизму.",
          "Блогер снял тебя в TikTok. Репутация растёт.",
          "Бабушка сказала: “молодец”. Мотивация +100.",
          "Районный инвестор заинтересовался твоим бизнесом.",
        ];
        if (Math.random() < 0.28) {
          const bonus = 50 + Math.floor(Math.random() * 150);
          addMoney(bonus);
          showFloatingText(`${events[Math.floor(Math.random() * events.length)]} +${bonus} ₽`);
          updateUI();
        }
      }, 20_000);

      setupTabs();
      renderShop();
      renderQuests();
      applyOfflineProgress();
      updateUI();
    </script>
  </body>
</html>
