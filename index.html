<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Бомжара CEO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #1f1f2e, #111118);
        color: white;
        text-align: center;
        user-select: none;
      }

      .game {
        max-width: 480px;
        margin: 0 auto;
        padding: 20px;
      }

      h1 {
        margin-top: 10px;
        font-size: 32px;
      }

      .subtitle {
        opacity: 0.8;
        margin-bottom: 20px;
      }

      .money {
        font-size: 36px;
        font-weight: bold;
        margin: 20px 0 5px;
      }

      .income {
        opacity: 0.8;
        margin-bottom: 20px;
      }

      .character {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: radial-gradient(circle, #ffce73, #d88a22);
        margin: 20px auto;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 80px;
        box-shadow: 0 10px 0 #8d5415;
        cursor: pointer;
        transition:
          transform 0.08s,
          box-shadow 0.08s;
      }

      .character:active {
        transform: translateY(8px) scale(0.97);
        box-shadow: 0 2px 0 #8d5415;
      }

      .btn {
        width: 100%;
        border: none;
        border-radius: 14px;
        padding: 14px;
        margin: 8px 0;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        background: #ffcc4d;
        color: #1c1c1c;
      }

      .btn:disabled {
        background: #555;
        color: #aaa;
        cursor: not-allowed;
      }

      .panel {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        padding: 15px;
        margin-top: 20px;
      }

      .small {
        font-size: 13px;
        opacity: 0.7;
      }

      .event {
        min-height: 22px;
        margin-top: 15px;
        color: #ffcc4d;
        font-weight: bold;
      }

      .rank {
        display: inline-block;
        padding: 8px 14px;
        margin: 10px 0 8px;
        border-radius: 999px;
        background: rgba(255, 204, 77, 0.14);
        color: #ffcc4d;
        font-weight: bold;
        font-size: 15px;
      }

      .progressWrap {
        width: 100%;
        height: 12px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        overflow: hidden;
        margin: 4px auto 6px;
      }

      .progressBar {
        width: 0%;
        height: 100%;
        background: #ffcc4d;
        border-radius: 999px;
        transition: width 0.2s ease;
      }

      .progressText {
        font-size: 13px;
        opacity: 0.75;
        margin-bottom: 12px;
      }

      .panelTitle {
        margin: 0 0 12px;
        font-size: 18px;
      }

      .questsPanel {
        text-align: left;
      }

      .questItem {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .questItem:last-child {
        border-bottom: none;
      }

      .questTitle {
        font-weight: bold;
        font-size: 14px;
      }

      .questProgress {
        margin-top: 4px;
        font-size: 12px;
        opacity: 0.72;
      }

      .questReward {
        margin-top: 4px;
        font-size: 12px;
        color: #ffcc4d;
      }

      .questBtn {
        min-width: 92px;
        border: none;
        border-radius: 12px;
        padding: 9px 10px;
        font-size: 13px;
        font-weight: bold;
        cursor: pointer;
        background: #ffcc4d;
        color: #1c1c1c;
      }

      .questBtn:disabled {
        background: #555;
        color: #aaa;
        cursor: not-allowed;
      }
    </style>
  </head>

  <body>
    <div class="game">
      <h1>Бомжара CEO</h1>
      <div class="subtitle">Кликай, богатея. Стань легендой района.</div>

      <div class="money" id="money">0 ₽</div>
      <div class="income" id="income">+0 ₽/сек · +1 ₽/клик</div>
      <div class="rank" id="rankText">Бомж района</div>

      <div class="progressWrap">
        <div class="progressBar" id="progressBar"></div>
      </div>

      <div class="progressText" id="progressText">
        До уровня “Сборщик мелочи”: 100 ₽
      </div>

      <div class="character" id="clickButton">🥴</div>

      <div class="event" id="eventText"></div>

      <div class="panel questsPanel">
        <h2 class="panelTitle">Задания района</h2>
        <div class="questsList" id="questsList"></div>
      </div>

      <div class="panel">
        <button class="btn" id="upgradeClick">
          Купить “Рваный стаканчик” — 25 ₽
        </button>

        <button class="btn" id="upgradeAuto">
          Купить “Шаурма-точку” — 100 ₽
        </button>

        <button class="btn" id="boostButton">
          Мем-буст x2 на 30 сек — 250 ₽
        </button>

        <button class="btn" id="dailyButton">Забрать ежедневный бонус</button>

        <button class="btn" id="shareButton">Позвать друга</button>

        <button class="btn" id="resetButton">Сбросить прогресс</button>

        <p class="small">
          Район ждёт легенду. Выполняй задания, расти и готовься к рейтингу.
        </p>
      </div>
    </div>

    <script>
      const tg = window.Telegram?.WebApp;

      if (tg) {
        tg.ready();
        tg.expand();
      }

      const telegramUser = tg?.initDataUnsafe?.user;

      if (telegramUser?.first_name) {
        setTimeout(() => {
          subtitleEl.textContent = `${telegramUser.first_name}, кликай и стань легендой района.`;
        }, 0);
      }

      const defaultState = {
        money: 0,
        totalEarned: 0,
        totalClicks: 0,
        dailyBonusClaims: 0,
        sharesCount: 0,
        claimedQuests: [],
        perClick: 1,
        perSecond: 0,
        clickUpgradeLevel: 0,
        autoUpgradeLevel: 0,
        clickUpgradeCost: 25,
        autoUpgradeCost: 100,
        boostActive: false,
        boostEndTime: 0,
        lastSaveTime: Date.now(),
        dailyBonusLastClaim: 0,
      };

      let state = loadGame();

      if (!state.totalEarned || state.totalEarned < state.money) {
        state.totalEarned = state.money;
      }

      const ranks = [
        { title: "Бомж района", need: 0 },
        { title: "Сборщик мелочи", need: 100 },
        { title: "Шаурма-стажёр", need: 500 },
        { title: "Дворовый бизнесмен", need: 2_000 },
        { title: "Шаурма-магнат", need: 10_000 },
        { title: "Олигарх района", need: 50_000 },
        { title: "Легенда района", need: 250_000 },
      ];

      const quests = [
        {
          id: "click_50",
          title: "Сделать 50 кликов",
          type: "clicks",
          target: 50,
          reward: 150,
        },
        {
          id: "click_upgrade_3",
          title: "Купить 3 улучшения клика",
          type: "clickUpgrades",
          target: 3,
          reward: 300,
        },
        {
          id: "auto_upgrade_2",
          title: "Купить 2 шаурма-точки",
          type: "autoUpgrades",
          target: 2,
          reward: 450,
        },
        {
          id: "daily_1",
          title: "Забрать ежедневный бонус",
          type: "dailyClaims",
          target: 1,
          reward: 250,
        },
        {
          id: "share_1",
          title: "Позвать друга",
          type: "shares",
          target: 1,
          reward: 500,
        },
      ];
      const moneyEl = document.getElementById("money");
      const incomeEl = document.getElementById("income");
      const rankText = document.getElementById("rankText");
      const progressBar = document.getElementById("progressBar");
      const progressText = document.getElementById("progressText");
      const questsList = document.getElementById("questsList");
      const clickButton = document.getElementById("clickButton");
      const upgradeClick = document.getElementById("upgradeClick");
      const upgradeAuto = document.getElementById("upgradeAuto");
      const boostButton = document.getElementById("boostButton");
      const dailyButton = document.getElementById("dailyButton");
      const shareButton = document.getElementById("shareButton");
      const resetButton = document.getElementById("resetButton");
      const eventText = document.getElementById("eventText");
      const subtitleEl = document.querySelector(".subtitle");

      function loadGame() {
        const saved = localStorage.getItem("bomzhara_ceo_save");

        if (!saved) {
          return { ...defaultState };
        }

        return {
          ...defaultState,
          ...JSON.parse(saved),
        };
      }

      function saveGame() {
        state.lastSaveTime = Date.now();
        localStorage.setItem("bomzhara_ceo_save", JSON.stringify(state));
      }

      function formatMoney(value) {
        if (value >= 1_000_000_000)
          return (value / 1_000_000_000).toFixed(1) + " млрд ₽";
        if (value >= 1_000_000)
          return (value / 1_000_000).toFixed(1) + " млн ₽";
        if (value >= 1_000) return (value / 1_000).toFixed(1) + " тыс ₽";
        return Math.floor(value) + " ₽";
      }

      function getCurrentRank() {
        let currentRank = ranks[0];

        for (const rank of ranks) {
          if (state.totalEarned >= rank.need) {
            currentRank = rank;
          }
        }

        return currentRank;
      }

      function getNextRank() {
        for (const rank of ranks) {
          if (state.totalEarned < rank.need) {
            return rank;
          }
        }

        return null;
      }

      function updateRankUI() {
        const currentRank = getCurrentRank();
        const nextRank = getNextRank();

        rankText.textContent = currentRank.title;

        if (!nextRank) {
          progressBar.style.width = "100%";
          progressText.textContent = "Максимальный уровень района достигнут";
          return;
        }

        const currentNeed = currentRank.need;
        const nextNeed = nextRank.need;
        const progress =
          ((state.totalEarned - currentNeed) / (nextNeed - currentNeed)) * 100;
        const safeProgress = Math.max(0, Math.min(100, progress));

        progressBar.style.width = `${safeProgress}%`;
        progressText.textContent = `До уровня “${nextRank.title}”: ${formatMoney(
          nextNeed - state.totalEarned,
        )}`;
      }

      function getQuestProgress(quest) {
        if (quest.type === "clicks") return state.totalClicks;
        if (quest.type === "clickUpgrades") return state.clickUpgradeLevel;
        if (quest.type === "autoUpgrades") return state.autoUpgradeLevel;
        if (quest.type === "dailyClaims") return state.dailyBonusClaims;
        if (quest.type === "shares") return state.sharesCount;

        return 0;
      }

      function isQuestClaimed(questId) {
        return state.claimedQuests.includes(questId);
      }

      function claimQuestReward(questId) {
        const quest = quests.find((item) => item.id === questId);

        if (!quest || isQuestClaimed(quest.id)) return;

        const progress = getQuestProgress(quest);

        if (progress < quest.target) return;

        state.money += quest.reward;
        state.totalEarned += quest.reward;
        state.claimedQuests.push(quest.id);

        tg?.HapticFeedback?.notificationOccurred?.("success");

        showFloatingText(`Задание выполнено: +${formatMoney(quest.reward)}`);
        updateUI();
      }

      function updateQuestsUI() {
        questsList.innerHTML = "";

        for (const quest of quests) {
          const progress = Math.min(getQuestProgress(quest), quest.target);
          const claimed = isQuestClaimed(quest.id);
          const completed = progress >= quest.target;

          const questItem = document.createElement("div");
          questItem.className = "questItem";

          const questInfo = document.createElement("div");

          const questTitle = document.createElement("div");
          questTitle.className = "questTitle";
          questTitle.textContent = quest.title;

          const questProgress = document.createElement("div");
          questProgress.className = "questProgress";
          questProgress.textContent = `Прогресс: ${progress}/${quest.target}`;

          const questReward = document.createElement("div");
          questReward.className = "questReward";
          questReward.textContent = `Награда: ${formatMoney(quest.reward)}`;

          questInfo.appendChild(questTitle);
          questInfo.appendChild(questProgress);
          questInfo.appendChild(questReward);

          const questButton = document.createElement("button");
          questButton.className = "questBtn";

          if (claimed) {
            questButton.textContent = "Забрано";
            questButton.disabled = true;
          } else if (completed) {
            questButton.textContent = "Забрать";
            questButton.disabled = false;
            questButton.addEventListener("click", () => claimQuestReward(quest.id));
          } else {
            questButton.textContent = "В процессе";
            questButton.disabled = true;
          }

          questItem.appendChild(questInfo);
          questItem.appendChild(questButton);
          questsList.appendChild(questItem);
        }
      }

      function applyOfflineProgress() {
        const now = Date.now();
        const awaySeconds = Math.floor((now - state.lastSaveTime) / 1000);

        if (awaySeconds < 10 || state.perSecond <= 0) {
          return;
        }

        const maxOfflineSeconds = 60 * 60 * 3;
        const countedSeconds = Math.min(awaySeconds, maxOfflineSeconds);
        const earned = countedSeconds * state.perSecond;

        state.money += earned;
        state.totalEarned += earned;

        setTimeout(() => {
          showFloatingText(`Пока тебя не было: +${formatMoney(earned)}`);
          updateUI();
        }, 500);
      }

      function getBoostMultiplier() {
        const now = Date.now();

        if (state.boostActive && now < state.boostEndTime) {
          return 2;
        }

        if (state.boostActive && now >= state.boostEndTime) {
          state.boostActive = false;
          eventText.textContent = "Буст закончился. Район снова суров.";
        }

        return 1;
      }

      function updateUI() {
        const boost = getBoostMultiplier();

        moneyEl.textContent = formatMoney(state.money);
        incomeEl.textContent = `+${formatMoney(state.perSecond * boost)}/сек · +${formatMoney(state.perClick * boost)}/клик`;

        upgradeClick.textContent = `Купить “Рваный стаканчик” ур. ${state.clickUpgradeLevel + 1} — ${formatMoney(state.clickUpgradeCost)}`;

        upgradeAuto.textContent = `Купить “Шаурма-точку” ур. ${state.autoUpgradeLevel + 1} — ${formatMoney(state.autoUpgradeCost)}`;

        boostButton.textContent = state.boostActive
          ? "Мем-буст уже активен"
          : "Мем-буст x2 на 30 сек — 250 ₽";

        upgradeClick.disabled = state.money < state.clickUpgradeCost;
        upgradeAuto.disabled = state.money < state.autoUpgradeCost;
        boostButton.disabled = state.money < 250 || state.boostActive;
        const now = Date.now();
        const oneDay = 24 * 60 * 60 * 1000;
        const dailyReady = now - state.dailyBonusLastClaim >= oneDay;

        dailyButton.disabled = !dailyReady;
        dailyButton.textContent = dailyReady
          ? "Забрать ежедневный бонус"
          : "Ежедневный бонус уже забран";
        updateQuestsUI();
        updateRankUI();
        saveGame();
      }

      function showFloatingText(text) {
        eventText.textContent = text;
        setTimeout(() => {
          if (eventText.textContent === text) {
            eventText.textContent = "";
          }
        }, 1800);
      }

      clickButton.addEventListener("click", () => {
        tg?.HapticFeedback?.impactOccurred?.("light");

        const gain = state.perClick * getBoostMultiplier();
        state.totalClicks += 1;
        state.money += gain;
        state.totalEarned += gain;

        showFloatingText(`+${formatMoney(gain)}. Улица уважает тебя.`);
        updateUI();
      });

      upgradeClick.addEventListener("click", () => {
        if (state.money < state.clickUpgradeCost) return;

        state.money -= state.clickUpgradeCost;
        state.clickUpgradeLevel += 1;
        state.perClick += 1 + state.clickUpgradeLevel;
        state.clickUpgradeCost = Math.floor(state.clickUpgradeCost * 1.7);

        showFloatingText("Стаканчик прокачан. Доход с клика вырос.");
        updateUI();
      });

      upgradeAuto.addEventListener("click", () => {
        if (state.money < state.autoUpgradeCost) return;

        state.money -= state.autoUpgradeCost;
        state.autoUpgradeLevel += 1;
        state.perSecond += 3 + state.autoUpgradeLevel * 2;
        state.autoUpgradeCost = Math.floor(state.autoUpgradeCost * 1.85);

        showFloatingText("Шаурма-точка открыта. Деньги капают сами.");
        updateUI();
      });

      boostButton.addEventListener("click", () => {
        if (state.money < 250 || state.boostActive) return;

        state.money -= 250;
        state.boostActive = true;
        state.boostEndTime = Date.now() + 30_000;

        showFloatingText("Мем-буст активирован: доход x2 на 30 секунд!");
        updateUI();
      });

      dailyButton.addEventListener("click", () => {
        const now = Date.now();
        const oneDay = 24 * 60 * 60 * 1000;

        if (now - state.dailyBonusLastClaim < oneDay) {
          return;
        }

        const bonus =
          500 + state.clickUpgradeLevel * 50 + state.autoUpgradeLevel * 100;

        state.money += bonus;
        state.totalEarned += bonus;
        state.dailyBonusClaims += 1;
        state.dailyBonusLastClaim = now;

        tg?.HapticFeedback?.notificationOccurred?.("success");

        showFloatingText(`Ежедневный бонус: +${formatMoney(bonus)}`);
        updateUI();
      });

      shareButton.addEventListener("click", () => {
        state.sharesCount += 1;
        updateUI();

        const text = encodeURIComponent(
          `Я уже строю империю в “Бомжара CEO” 🥴\nСможешь обогнать меня?`,
        );

        const url = encodeURIComponent("https://t.me/bomzhara_ceo_bot");

        const shareUrl = `https://t.me/share/url?url=${url}&text=${text}`;

        if (tg?.openTelegramLink) {
          tg.openTelegramLink(shareUrl);
        } else {
          window.open(shareUrl, "_blank");
        }
      });

      resetButton.addEventListener("click", () => {
        const confirmed = confirm("Точно сбросить прогресс?");
        if (!confirmed) return;

        state = { ...defaultState };
        saveGame();
        updateUI();
      });

      setInterval(() => {
        const boost = getBoostMultiplier();
        const passiveGain = state.perSecond * boost;

        state.money += passiveGain;
        state.totalEarned += passiveGain;

        updateUI();
      }, 1000);

      setInterval(() => {
        const events = [
          "Прохожий кинул сотку за харизму.",
          "Блогер снял тебя в TikTok. Репутация растёт.",
          "Бабушка сказала: “молодец”. Мотивация +100.",
          "Районный инвестор заинтересовался твоим бизнесом.",
        ];

        if (Math.random() < 0.35) {
          const bonus = 20 + Math.floor(Math.random() * 80);
          state.money += bonus;
          state.totalEarned += bonus;
          showFloatingText(
            `${events[Math.floor(Math.random() * events.length)]} +${bonus} ₽`,
          );
          updateUI();
        }
      }, 15000);

      applyOfflineProgress();
      updateUI();
    </script>
  </body>
</html>
